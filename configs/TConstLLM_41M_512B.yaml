experiment_name: "TConstLLM_41M_train_len_512B_wikitext-103-v1"

# Model configuration
model:
  module: "src.models.tconst_llm"
  class: "TConstLLM"

  model_args:
    vocab_size: 50257 # 50257 GPT-2 tokenizer vocab size, adjust as needed
    n_embd: 432
    n_head: 12
    n_transformer_block: 2 # total layer: n_transformer_block * block_inner_depth
    block_inner_depth: 4

    dropout: 0.1

    history_windown_size: 256
    generate_window_size: 256
    rope_precompute_threshold: 32768 # for HybridRotaryEmbedding

# Data configuration
data:
  # Hugging Face dataset name
  # dataset_path: "brando/small-c4-dataset"
  # dataset_name: NULL
  # dataset_path: "jxm/gpt-oss20b-samples"
  # dataset_name: NULL
  dataset_path: "Salesforce/wikitext"
  dataset_name: "wikitext-103-v1"
  dataset_cache_dir: "dataset_cache"
  tokenizer_name: "gpt2"
  max_train_seq_len: 512
  num_workers: 16
  validation_ratio: 0.03 # ratio if validation not in datasets
  packed_dataset_cache:
    use_cache: true
    dir: ./dataset_cache/packed_dataset_cache

# Training configuration
training:
  optimizer: "AdamW"
  learning_rate: 3.0e-4
  weight_decay: 0.06
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0

  # Training loop
  num_train_epochs: 10

  # checkpoints
  use_checkpoint: False

  # Cache
  kv_cache_on: False

  #  BATCH_SIZE
  batch_method: fixed  # auto or fixed
  profile_memory_batch_size: 3  # only valid when batch_method is auto
  gpu_memory_limit: 0.79 # only valid when batch_method is auto
  virtual_train_batch_size: 256  # 梯度累积后的等效size
  per_device_train_batch_size: 32 # only valid when batch_method is not auto
  per_device_eval_batch_size: 2 # only valid when batch_method is not auto

  # We can keep the scheduler settings from the base config
  lr_scheduler_type: "cosine"
  warmup_steps: 2000

  # Logging and saving
  logging_steps: 1 # Log every accumulated step
  save_steps: 1 # SAVE_MODLE_STEPS
  eval_steps: 1 # evaluate every time we save

sft:
  # --- SFT Dataset ---
  dataset_path: "databricks/databricks-dolly-15k"
  dataset_name: ""

  # Caching for the PROCESSED (tokenized, masked) SFT dataset
  # Caching configuration is good.
  processed_dataset_cache:
    use_cache: True
    dir: './dataset_cache/sft_processed_cache'

  # --- Optimizer & Hyperparameters ---
  optimizer: "AdamW"
  learning_rate: 2.0e-5    # GOOD: This is a standard, solid learning rate for SFT.
  weight_decay: 0.01       # CHANGED: 0.06 is high for fine-tuning. 0.01 or 0 is more common.
  beta1: 0.9
  beta2: 0.95              # GOOD: Standard AdamW betas.
  grad_clip: 1.0           # GOOD: Standard gradient clipping.

  num_train_epochs: 10      # CHANGED: Dolly-15k is high quality. 2-3 epochs is the sweet spot.

  # --- Scheduler ---
  lr_scheduler_type: "cosine"
  warmup_steps: 100        # CHANGED: 2000 is far too long for a short SFT run. 
                           # Warmup should be a small fraction of total steps.

  # --- Batching ---
  virtual_train_batch_size: 128 # CHANGED: 256 is quite large for SFT. 64-128 is more typical.
  per_device_train_batch_size: 1 # CHANGED: 32 is extremely high for long sequences, will cause OOM. Start small.
  per_device_eval_batch_size: 1  # CHANGED: Keep eval batch size consistent or slightly larger.

  # --- Logging and Saving ---
  logging_steps: 1        # CHANGED: Logging every single step is too verbose and can slow down I/O.
  save_steps: 1            # OK, but consider changing to save per epoch if disk space is a concern.

# Hardware
hardware:
  device: "cuda"
  compile: False
